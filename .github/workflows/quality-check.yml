name: Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  site-health:
    name: 사이트 접속 확인
    runs-on: ubuntu-latest
    steps:
      - name: pro-dashboards.com 접속
        run: |
          curl -f --max-time 15 --retry 3 --retry-delay 5 \
            -o /dev/null -s -w "HTTP %{http_code}\n" \
            https://pro-dashboards.com
          echo "✅ pro-dashboards.com 정상"
